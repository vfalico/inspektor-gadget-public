name: profile cuda
description: >-
  CUDA memory profiling via libcuda.so uprobes — tracks allocations
  including async alloc, free, and pool create with stack traces.
homepageURL: https://inspektor-gadget.io/
documentationURL: https://www.inspektor-gadget.io/docs/latest/gadgets/profile_cuda
sourceURL: https://github.com/inspektor-gadget/inspektor-gadget/tree/main/gadgets/profile_cuda
datasources:
  allocs:
    annotations:
      ebpf.map.flush-on-stop: "true"
      cli.clear-screen-before: "true"
      profiles.stack-fields: ustack_raw.symbols
      profiles.value-field: count
      profiles.type: malloc
      profiles.unit: bytes
    fields:
      proc.comm:
        annotations:
          flamegraph.level: 10
          flamegraph.type: single
          profiles.sample-attribute: "true"
  errors:
    annotations:
      description: "CUDA API errors with function identification"
    fields:
      timestamp_ns:
        annotations:
          columns.hidden: "true"
      error_code:
        annotations:
          description: "CUDA error code (2=OOM, 700=illegal_addr, etc.)"
          columns.width: 12
      api_id:
        annotations:
          description: "API function ID (1=MemAlloc, 3=ModuleLoad, 7=LaunchKernel, etc.)"
          columns.width: 10
  syncs:
    annotations:
      description: "Sync stall events exceeding threshold"
    fields:
      timestamp_ns:
        annotations:
          columns.hidden: "true"
      duration_ns:
        annotations:
          description: "Duration the sync call blocked (ns)"
          columns.width: 16
      sync_type:
        annotations:
          description: "1=cuCtxSync, 2=cuStreamSync, 3=cuEventSync"
          columns.width: 10
  launches:
    annotations:
      description: "Kernel and graph launch events for launch-rate analysis"
    fields:
      timestamp_ns:
        annotations:
          columns.hidden: "true"
      launch_type:
        annotations:
          description: "1=cuLaunchKernel, 2=cuGraphLaunch"
          columns.width: 12
  memcpys:
    annotations:
      description: "Host-device memory transfer events"
    fields:
      timestamp_ns:
        annotations:
          columns.hidden: "true"
      size_bytes:
        annotations:
          description: "Transfer size in bytes"
          columns.width: 14
      direction:
        annotations:
          description: "1=HtoD, 2=DtoH, 3=DtoD, 4=Peer"
          columns.width: 10
      is_async:
        annotations:
          description: "0=synchronous, 1=asynchronous"
          columns.width: 8
  contexts:
    annotations:
      description: "CUDA context lifecycle events (create/destroy/set)"
    fields:
      timestamp_ns:
        annotations:
          columns.hidden: "true"
      event_type:
        annotations:
          description: "1=create, 2=destroy, 3=set_current"
          columns.width: 12
params:
  ebpf:
    sync_threshold_ns:
      key: sync_threshold_ns
      description: "Sync duration threshold (ns) to emit stall event"
      defaultValue: "10000000"
