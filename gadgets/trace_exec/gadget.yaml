name: trace exec
description: trace process executions
homepageURL: https://inspektor-gadget.io/
documentationURL: https://www.inspektor-gadget.io/docs/latest/gadgets/trace_exec
sourceURL: https://github.com/inspektor-gadget/inspektor-gadget/tree/main/gadgets/trace_exec
datasources:
  exec:
    annotations:
      ebpf.tlv: "true"
      ebpf.tlv.rest: args
      ebpf.tlv.rest_len: args_size
    fields:
      cwd:
        annotations:
          description: The current working directory of the process (require --paths flag)
          columns.width: 64
          columns.hidden: "true"
          columns.alignment: left
          ebpf.tlv.id: "1"
      exepath:
        annotations:
          description: The executable binary file of the process (require --paths flag)
          columns.width: 64
          columns.hidden: "true"
          columns.alignment: left
          ebpf.tlv.id: "3"
      parent_exepath:
        annotations:
          description: The executable binary file of the parent process (require --paths flag)
          columns.width: 64
          columns.hidden: "true"
          columns.alignment: left
          ebpf.tlv.id: "4"
      file:
        annotations:
          description: The executable file of the process. It might be different to exepath in case of a script (require --paths flag)
          columns.width: 64
          columns.hidden: "true"
          columns.alignment: left
          ebpf.tlv.id: "2"
      dev_major:
        annotations:
          description: The major number of the device where the file is located (requires --paths flag)
          columns.width: 5
          columns.hidden: "true"
          columns.alignment: right
      dev_minor:
        annotations:
          description: The minor number of the device where the file is located (requires --paths flag)
          columns.width: 5
          columns.hidden: "true"
          columns.alignment: right
      inode:
        annotations:
          description: The inode number of the file (require --paths flag)
          columns.width: 5
          columns.hidden: "true"
          columns.alignment: right
      loginuid:
        annotations:
          template: uid
          columns.hidden: true
          uidgidresolver.target: loginuser
      sessionid:
        annotations:
          template: uid
          columns.hidden: true
      error:
        annotations:
          columns.width: 5
          columns.alignment: right
      args_count:
        annotations:
          columns.hidden: true
          json.skip: true
      args_size:
        annotations:
          columns.hidden: true
          json.skip: true
      args:
        annotations:
          columns.width: 16
      upper_layer:
        annotations:
          description: Whether the executable is in the upper layer of the overlay filesystem
          columns.width: 5
          columns.hidden: true
      pupper_layer:
        annotations:
          description: Whether the parent executable is in the upper layer of the overlay filesystem
          columns.width: 5
          columns.hidden: true
      fupper_layer:
        annotations:
          description: Whether the file is in the upper layer of the overlay filesystem
          columns.width: 5
          columns.hidden: true
      tty:
        annotations:
          description: The controlling terminal of the process
          columns.width: 5
          columns.hidden: false
      from_rootfs:
        annotations:
          description: Whether the executable is in the rootfs of the container
          columns.width: 5
          columns.hidden: true
      file_from_rootfs:
        annotations:
          description: Whether the file is in the rootfs of the container
          columns.width: 5
          columns.hidden: true
params:
  ebpf:
    ignore_failed:
      key: ignore-failed
      defaultValue: "true"
      description: Ignore failed events
    paths:
      key: paths
      defaultValue: "false"
      description: Show current working directory, file path and executable path
