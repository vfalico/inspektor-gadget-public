name: cuda_error_trace
description: Trace CUDA Driver API errors with enriched human-readable descriptions
homepageURL: https://github.com/inspektor-gadget/inspektor-gadget
documentationURL: https://github.com/inspektor-gadget/inspektor-gadget/blob/main/gadgets/cuda_error_trace/README.md
sourceURL: https://github.com/inspektor-gadget/inspektor-gadget
datasources:
  cuda_errors:
    fields:
      timestamp_raw:
        annotations:
          description: Event timestamp (boot nanoseconds)
          columns.hidden: "true"
      proc.pid:
        annotations:
          description: Process ID
          columns.width: "7"
      proc.tid:
        annotations:
          description: Thread ID
          columns.hidden: "true"
      proc.comm:
        annotations:
          description: Process name
          columns.width: "16"
      error_code:
        annotations:
          description: "Raw CUDA error code (CUresult). 0 = CUDA_SUCCESS (never emitted)."
          columns.width: "5"
          columns.alignment: right
          value.one-of: |
            1: CUDA_ERROR_INVALID_VALUE
            2: CUDA_ERROR_OUT_OF_MEMORY
            3: CUDA_ERROR_NOT_INITIALIZED
            4: CUDA_ERROR_DEINITIALIZED
            5: CUDA_ERROR_PROFILER_DISABLED
            9: CUDA_ERROR_STUB_LIBRARY
            34: CUDA_ERROR_NO_DEVICE
            35: CUDA_ERROR_INVALID_DEVICE
            36: CUDA_ERROR_DEVICE_NOT_LICENSED
            46: CUDA_ERROR_INVALID_IMAGE
            48: CUDA_ERROR_INVALID_CONTEXT
            49: CUDA_ERROR_CONTEXT_ALREADY_CURRENT
            54: CUDA_ERROR_MAP_FAILED
            55: CUDA_ERROR_UNMAP_FAILED
            56: CUDA_ERROR_ARRAY_IS_MAPPED
            57: CUDA_ERROR_ALREADY_MAPPED
            58: CUDA_ERROR_NO_BINARY_FOR_GPU
            59: CUDA_ERROR_ALREADY_ACQUIRED
            60: CUDA_ERROR_NOT_MAPPED
            61: CUDA_ERROR_NOT_MAPPED_AS_ARRAY
            62: CUDA_ERROR_NOT_MAPPED_AS_POINTER
            63: CUDA_ERROR_ECC_UNCORRECTABLE
            64: CUDA_ERROR_UNSUPPORTED_LIMIT
            65: CUDA_ERROR_CONTEXT_ALREADY_IN_USE
            66: CUDA_ERROR_PEER_ACCESS_UNSUPPORTED
            67: CUDA_ERROR_INVALID_PTX
            68: CUDA_ERROR_INVALID_GRAPHICS_CONTEXT
            69: CUDA_ERROR_NVLINK_UNCORRECTABLE
            700: CUDA_ERROR_ILLEGAL_ADDRESS
            999: CUDA_ERROR_UNKNOWN
      error_name:
        annotations:
          description: "Human-readable CUDA error name (added by WASM enricher)"
          columns.width: "40"
      api_id:
        annotations:
          description: "Internal API identifier. See api_name for human-readable name."
          columns.hidden: "true"
      api_name:
        annotations:
          description: "CUDA Driver API function that returned the error (added by WASM enricher)"
          columns.width: "28"
      description:
        annotations:
          description: "Plain-English description of what the error means (added by WASM enricher)"
          columns.hidden: "true"
      category:
        annotations:
          description: "Error category: memory, launch, context, module, stream, event, device, init (added by WASM enricher)"
          columns.width: "10"
      suggestion:
        annotations:
          description: "Actionable remediation suggestion (added by WASM enricher)"
          columns.hidden: "true"
      context_info:
        annotations:
          description: "Context-specific details derived from API arguments, e.g. requested_bytes=N (added by WASM enricher)"
          columns.width: "40"
      arg1:
        annotations:
          description: "Raw argument 1 (meaning depends on API; see context_info)"
          columns.hidden: "true"
      arg2:
        annotations:
          description: "Raw argument 2 (meaning depends on API; see context_info)"
          columns.hidden: "true"
      arg3:
        annotations:
          description: "Raw argument 3 (meaning depends on API; see context_info)"
          columns.hidden: "true"
      arg4:
        annotations:
          description: "Raw argument 4 (meaning depends on API; see context_info)"
          columns.hidden: "true"
      arg5:
        annotations:
          description: "Raw argument 5 (meaning depends on API; see context_info)"
          columns.hidden: "true"
      arg6:
        annotations:
          description: "Raw argument 6 (meaning depends on API; see context_info)"
          columns.hidden: "true"
      ustack_raw:
        annotations:
          description: "Userspace stack trace with resolved symbols"
          columns.width: "60"
      why:
        annotations:
          description: "Human-readable explanation of what went wrong and why"
          columns.width: "80"
